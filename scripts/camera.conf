# timps config for the WUUK Y0510 (T31 / SC4336P)
general.loglevel = 3

sensor.model    = sc4336p
sensor.i2c_addr = 0x30
sensor.fps      = 25
sensor.width    = 2560
sensor.height   = 1440

rtsp.port = 554         # Standard-RTSP-Port (wie thingino/prudynt) - laeuft als root
http.port = 8080
http.preview_chn = 1

# Authentifizierung: sobald user/pass gesetzt sind, verlangt RTSP (Digest) UND
# HTTP (Basic) eine Anmeldung. Leer/auskommentiert = offen (kein Login). HTTP
# nutzt die RTSP-Zugangsdaten, wenn http.user/pass nicht separat gesetzt sind.
# Zum Testen deaktiviert - zum Aktivieren einkommentieren und Werte aendern:
# rtsp.user = admin
# rtsp.pass = CHANGE-ME
# http.user = admin
# http.pass = CHANGE-ME

video0.enabled   = 1
video0.codec     = h264
video0.width     = 1920
video0.height    = 1080
video0.fps       = 25
video0.bitrate   = 3000
video0.gop       = 50
video0.rtsp_path = /ch0

video1.enabled   = 1
video1.codec     = h264
video1.width     = 640
video1.height    = 360
video1.fps       = 25
video1.bitrate   = 512
video1.gop       = 50
video1.rtsp_path = /ch1

audio.enabled    = 1
audio.codec      = aac      # needs timps built with USE_FAAC=1 (BR2_PACKAGE_FAAC selected)
audio.volume     = 80      # IMP_AI Lautstärke (bei zu leise/laut anpassen)
audio.gain       = 25      # IMP_AI Vorverstärkung

# OSD is drawn on ALL streams. Position with x/y:
#   > 0  = pixels from the left/top edge
#   < 0  = pixels from the right/bottom edge
#   = 0  = centered on that axis
# Text placeholders: {hostname} {ip} {mac} {fps} {uptime} + strftime
# (%Y %m %d %H %M %S ...). Text is re-rendered only when it changes.
osd.enabled      = 1
osd.font_path    = /usr/share/fonts/default.ttf

osd0.enabled = 1
osd0.type    = text
osd0.text    = %Y-%m-%d %H:%M:%S
osd0.x       = 10
osd0.y       = 10

osd1.enabled = 1
osd1.type    = text
osd1.text    = {hostname}
osd1.x       = 0
osd1.y       = 10

osd2.enabled = 1
osd2.type    = text
osd2.text    = {uptime}
osd2.x       = -10
osd2.y       = 10

osd3.enabled  = 1
osd3.type     = logo
osd3.logo     = /usr/share/images/thingino_100x30.bgra
osd3.logo_w   = 100
osd3.logo_h   = 30
osd3.x        = -10
osd3.y        = -10

# Debug-Zeile unten links. Platzhalter:
#   {fps}     gemessene Encoder-FPS
#   {net}     TX-Durchsatz, auto kbit/s <-> Mbit/s (alias {tx})
#   {cpu}     1-Minuten-Load
#   {mem}     freier RAM in MB
#   {clients} aktuelle Zuschauer (Summe ueber alle Videostreams)
osd4.enabled = 1
osd4.type    = text
osd4.text    = {fps}fps {net} cpu{cpu} {mem} {clients}cli
osd4.x       = 10
osd4.y       = -10

jpeg.enabled     = 1
jpeg.width       = 640
jpeg.height      = 360
jpeg.fps         = 5

# Weitere JPEG-Aufloesungen ohne extra rmem: JPEG-Encoder haengt sich an den
# vorhandenen Videokanal (teilt dessen FrameSource). Abruf mit ?chn=N:
#   http://<ip>:8080/snapshot.jpg?chn=0   (1920x1080, von video0)
#   http://<ip>:8080/stream.mjpeg?chn=1   (640x360,   von video1)
video0.jpeg         = true
video0.jpeg_quality = 75
video0.jpeg_fps     = 5
video0.jpeg_chn     = 3      # eindeutiger IMP-Encoder-Kanal
video1.jpeg         = true
video1.jpeg_chn     = 4
